background-color=#151515
text-color=#CFC7BB
border-color=#2A2A2A
progress-color=over #23211F
width=420
height=110
padding=12
border-size=2
border-radius=12
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32
icons=1
markup=1
format=<b>%s</b>\n%b

[urgency=low]
background-color=#151515
text-color=#7B6A72
border-color=#2A2A2A
default-timeout=3000

[urgency=normal]
background-color=#151515
text-color=#CFC7BB
border-color=#2A2A2A
default-timeout=5000

[urgency=high]
background-color=#151515
text-color=#EEE7DC
border-color=#8A5A5A
default-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
